<!doctype html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ax^n (JSXGraph)</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/jsxgraph/distrib/jsxgraph.css">
  <script src="https://cdn.jsdelivr.net/npm/jsxgraph/distrib/jsxgraphcore.js"></script>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; background: #0f1117; color: #e7ecf3; font-family: system-ui, sans-serif; }
    .app { width: 100vw; height: 100vh; display: grid; grid-template-rows: auto 1fr; gap: 10px; padding: 12px; }
    .controls { display: grid; gap: 8px; }
    .row { display: grid; grid-template-columns: 24px 1fr 50px; gap: 8px; align-items: center; }
    #box { width: 100%; height: 100%; background: #121826; border: 1px solid #2a3347; }
  </style>
</head>
<body>
  <main class="app">
    <section class="controls">
      <div class="row"><label for="a">a</label><input id="a" type="range" min="-5" max="5" step="0.1" value="1"><output id="aOut">1.0</output></div>
      <div class="row"><label for="n">n</label><input id="n" type="range" min="-4" max="8" step="1" value="2"><output id="nOut">2</output></div>
    </section>
    <div id="box" class="jxgbox"></div>
  </main>

  <script>
    const aS = document.getElementById('a');
    const nS = document.getElementById('n');
    const aOut = document.getElementById('aOut');
    const nOut = document.getElementById('nOut');
    let a = 1, n = 2;

    const board = JXG.JSXGraph.initBoard('box', {
      boundingbox: [-5, 5, 5, -5], axis: true, grid: true,
      pan: { enabled: false }, zoom: { enabled: false }, showNavigation: false, showCopyright: false
    });

    board.defaultAxes.x.setAttribute({ strokeColor: '#f6f8fb', ticks: { strokeColor: '#d7dfeb', drawLabels: true, ticksDistance: 1 } });
    board.defaultAxes.y.setAttribute({ strokeColor: '#f6f8fb', ticks: { strokeColor: '#d7dfeb', drawLabels: true, ticksDistance: 1 } });
    board.setAttribute({ grid: { strokeColor: 'rgba(255,255,255,0.15)' } });

    board.create('functiongraph', [
      (x) => a * Math.pow(Math.abs(x), n) * (x < 0 && n % 2 !== 0 ? -1 : 1),
      -5,
      5
    ], { strokeColor: '#5eead4', strokeWidth: 3, highlight: false });

    function render() {
      a = parseFloat(aS.value); n = parseInt(nS.value, 10);
      aOut.textContent = a.toFixed(1); nOut.textContent = String(n);
      board.update();
    }

    aS.addEventListener('input', render);
    nS.addEventListener('input', render);
    window.addEventListener('resize', () => board.resizeContainer(document.getElementById('box').clientWidth, document.getElementById('box').clientHeight, true));
    render();
  </script>
</body>
</html>
