<!doctype html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ax^n Explorer (JSXGraph)</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/jsxgraph/distrib/jsxgraph.css">
  <script src="https://cdn.jsdelivr.net/npm/jsxgraph/distrib/jsxgraphcore.js"></script>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background: #0f1117;
      color: #e7ecf3;
      font-family: "Segoe UI", system-ui, sans-serif;
      display: grid;
      place-items: center;
      padding: 24px;
    }
    .card {
      width: min(100%, 980px);
      background: #171b24;
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 14px;
      padding: 20px;
    }
    h1 {
      margin: 0 0 8px;
      font-size: 1.2rem;
      font-weight: 600;
    }
    .formula {
      margin: 0 0 14px;
      color: #aab5c5;
      font-family: "Cascadia Code", "Consolas", monospace;
    }
    .controls {
      display: grid;
      gap: 10px;
      margin-bottom: 14px;
    }
    .row {
      display: grid;
      grid-template-columns: 26px 1fr 56px;
      align-items: center;
      gap: 10px;
    }
    .row label {
      color: #aab5c5;
      font-family: "Cascadia Code", "Consolas", monospace;
    }
    .row output {
      text-align: right;
      color: #e7ecf3;
      font-family: "Cascadia Code", "Consolas", monospace;
    }
    #box {
      width: 100%;
      height: 540px;
      border-radius: 10px;
      overflow: hidden;
      background: #111722;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>ax^n Explorer (JSXGraph)</h1>
    <p class="formula">f(x) = <span id="aVal">1.0</span> · x^<span id="nVal">2.0</span></p>

    <section class="controls">
      <div class="row">
        <label for="a">a</label>
        <input id="a" type="range" min="-5" max="5" step="0.1" value="1">
        <output id="aOut">1.0</output>
      </div>
      <div class="row">
        <label for="n">n</label>
        <input id="n" type="range" min="-4" max="8" step="0.1" value="2">
        <output id="nOut">2.0</output>
      </div>
    </section>

    <div id="box" class="jxgbox"></div>
  </main>

  <script>
    const aSlider = document.getElementById('a');
    const nSlider = document.getElementById('n');
    const aOut = document.getElementById('aOut');
    const nOut = document.getElementById('nOut');
    const aVal = document.getElementById('aVal');
    const nVal = document.getElementById('nVal');

    let a = 1;
    let n = 2;

    const board = JXG.JSXGraph.initBoard('box', {
      boundingbox: [-5, 5, 5, -5],
      axis: true,
      grid: true,
      showNavigation: false,
      showCopyright: false,
      pan: { enabled: false },
      zoom: { enabled: false }
    });

    board.defaultAxes.x.setAttribute({
      strokeColor: '#f6f8fb',
      strokeWidth: 1.6,
      ticks: { strokeColor: '#d7dfeb', label: { strokeColor: '#d7dfeb' } }
    });

    board.defaultAxes.y.setAttribute({
      strokeColor: '#f6f8fb',
      strokeWidth: 1.6,
      ticks: { strokeColor: '#d7dfeb', label: { strokeColor: '#d7dfeb' } }
    });

    board.setAttribute({
      grid: {
        strokeColor: 'rgba(255,255,255,0.14)',
        strokeWidth: 1
      }
    });

    const graph = board.create('functiongraph', [
      function (x) {
        return a * Math.pow(Math.abs(x), n) * (x < 0 && n % 2 !== 0 ? -1 : 1);
      },
      -5,
      5
    ], {
      strokeColor: '#67d6ff',
      strokeWidth: 3,
      highlight: false
    });

    function render() {
      a = parseFloat(aSlider.value);
      n = parseFloat(nSlider.value);

      aOut.value = a.toFixed(1);
      nOut.value = n.toFixed(1);
      aVal.textContent = a.toFixed(1);
      nVal.textContent = n.toFixed(1);

      graph.updateCurve();
      board.update();
    }

    aSlider.addEventListener('input', render);
    nSlider.addEventListener('input', render);
    window.addEventListener('resize', () => board.resizeContainer(
      document.getElementById('box').clientWidth,
      document.getElementById('box').clientHeight,
      true
    ));

    render();
  </script>
</body>
</html>
