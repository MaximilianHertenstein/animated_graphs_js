<!doctype html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Power Function (uPlot)</title>
  <link rel="stylesheet" href="shared-app.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/uplot@1.6.24/dist/uPlot.min.css">
  <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
  <script src="shared-power.js"></script>
</head>
<body>
  <main class="app">
    <section class="controls">
      <div class="row"><label for="a">a</label><input id="a" type="range" min="-5" max="5" step="0.1" value="1"><output id="aOut">1.0</output></div>
      <div class="row"><label for="n">n</label><input id="n" type="range" min="-4" max="8" step="1" value="2"><output id="nOut">2</output></div>
    </section>
    <div id="formula" class="formula">\(f(x)=1.0\cdot x^{2}\)</div>
    <div id="plot" class="plot-surface"></div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/uplot@1.6.24/dist/uPlot.iife.min.js"></script>
  <script>
    const ui = PowerShared.getPowerUI("plot");
    let u;

    function data(a, n) {
      const xs = [];
      const ys = [];
      for (let i = 0; i <= 3000; i++) {
        const x = PowerShared.X_MIN + ((PowerShared.X_MAX - PowerShared.X_MIN) * i / 3000);
        const y = PowerShared.powerY(a, n, x);
        xs.push(x);
        ys.push(PowerShared.toVisibleY(y));
      }
      return [xs, ys];
    }

    function opts() {
      return {
        width: ui.plotEl.clientWidth,
        height: ui.plotEl.clientHeight,
        pxAlign: 0,
        scales: {
          x: { time: false, auto: false, range: () => [PowerShared.X_MIN, PowerShared.X_MAX] },
          y: { auto: false, range: () => [PowerShared.Y_MIN, PowerShared.Y_MAX] }
        },
        axes: [
          {
            stroke: "#d7dfeb",
            grid: { stroke: "rgba(255,255,255,0.15)", width: 1 },
            ticks: { show: true, size: 5, stroke: "#d7dfeb", width: 1 },
            splits: window.PowerShared.TICKS,
            label: "",
            values: (u, splits) => splits.map(v => v.toString())
          },
          {
            stroke: "#d7dfeb",
            grid: { stroke: "rgba(255,255,255,0.15)", width: 1 },
            ticks: { show: true, size: 5, stroke: "#d7dfeb", width: 1 },
            splits: window.PowerShared.TICKS,
            values: (u, splits) => splits.map(v => v.toString()),
            side: -1
          }
        ],
        hooks: {
          draw: [
            (u) => {
              const ctx = u.ctx;
              const x0 = u.valToPos(0, "x", true);
              const y0 = u.valToPos(0, "y", true);

              ctx.save();
              ctx.strokeStyle = "#f6f8fb";
              ctx.lineWidth = 2;

              ctx.beginPath();
              ctx.moveTo(u.bbox.left, y0);
              ctx.lineTo(u.bbox.left + u.bbox.width, y0);
              ctx.stroke();

              ctx.beginPath();
              ctx.moveTo(x0, u.bbox.top);
              ctx.lineTo(x0, u.bbox.top + u.bbox.height);
              ctx.stroke();

              ctx.restore();
            }
          ]
        },
        series: [{}, { stroke: "#5eead4", width: 3 }]
      };
    }

    function render() {
      const { a, n } = PowerShared.syncPowerUI(ui);
      if (!u) u = new uPlot(opts(), data(a, n), ui.plotEl);
      else u.setData(data(a, n));
    }

    PowerShared.bindPowerUI(ui, render, () => {
      if (!u) return;
      u.setSize({ width: ui.plotEl.clientWidth, height: ui.plotEl.clientHeight });
      render();
    });
    render();
  </script>
</body>
</html>
