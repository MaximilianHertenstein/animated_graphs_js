<!doctype html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Exponential Function (SVG)</title>
  <link rel="stylesheet" href="shared-app.css">
  <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
</head>
<body>
  <main class="app">
    <section class="controls">
      <div class="row"><label for="a">a</label><input id="a" type="range" min="-5" max="5" step="0.1" value="1"><output id="aOut">1.0</output></div>
      <div class="row"><label for="q">q</label><input id="q" type="range" min="0" max="5" step="0.1" value="1"><output id="qOut">1.0</output></div>
      <div class="row"><label for="c">c</label><input id="c" type="range" min="-5" max="5" step="0.1" value="0"><output id="cOut">0.0</output></div>
    </section>
    <div id="formula" class="formula">\(f(x)=1.0\cdot 1.0^{x}+0.0\)</div>
    <svg id="plot" class="plot-surface" viewBox="0 0 800 600" preserveAspectRatio="xMidYMid meet"></svg>
  </main>
  <script>
    const s = document.getElementById('plot');
    const aS = document.getElementById('a');
    const qS = document.getElementById('q');
    const cS = document.getElementById('c');
    const aO = document.getElementById('aOut');
    const qO = document.getElementById('qOut');
    const cO = document.getElementById('cOut');
    const formula = document.getElementById('formula');
    const min = -5;
    const max = 5;
    const p = 60;
    const createSvgEl = (tag, attrs) => {
      const el = document.createElementNS('http://www.w3.org/2000/svg', tag);
      Object.entries(attrs).forEach(([k, v]) => el.setAttribute(k, v));
      return el;
    };
    const tx = (x, w) => p + ((x - min) / (max - min)) * (w - 2 * p);
    const ty = (y, h) => h - p - ((y - min) / (max - min)) * (h - 2 * p);
    function render() {
      const a = parseFloat(aS.value);
      const q = parseFloat(qS.value);
      const c = parseFloat(cS.value);
      aO.textContent = a.toFixed(1);
      qO.textContent = q.toFixed(1);
      cO.textContent = c.toFixed(1);
      formula.innerHTML = `\\(f(x)=${a.toFixed(1)}\\cdot ${q.toFixed(1)}^{x}+${c.toFixed(1)}\\)`;
      if (window.MathJax && MathJax.typesetPromise) {
        MathJax.typesetPromise([formula]).catch(() => {});
      }
      const w = s.clientWidth || 800;
      const h = s.clientHeight || 600;
      s.setAttribute('viewBox', `0 0 ${w} ${h}`);
      s.setAttribute('preserveAspectRatio', 'xMidYMid meet');
      s.replaceChildren();
      for (let i = -5; i <= 5; i++) {
        s.appendChild(createSvgEl('line', {
          x1: tx(i, w), y1: p, x2: tx(i, w), y2: h - p,
          stroke: 'rgba(255,255,255,.15)'
        }));
        s.appendChild(createSvgEl('line', {
          x1: p, y1: ty(i, h), x2: w - p, y2: ty(i, h),
          stroke: 'rgba(255,255,255,.15)'
        }));
      }
      s.appendChild(createSvgEl('line', {
        x1: p, y1: ty(0, h), x2: w - p, y2: ty(0, h),
        stroke: '#f6f8fb', 'stroke-width': '2'
      }));
      s.appendChild(createSvgEl('line', {
        x1: tx(0, w), y1: p, x2: tx(0, w), y2: h - p,
        stroke: '#f6f8fb', 'stroke-width': '2'
      }));
      let pts = "";
      for (let i = 0; i <= 1000; i++) {
        const x = min + ((max - min) * i) / 1000;
        const y = a * Math.pow(q, x) + c;
        if (Number.isFinite(y)) pts += `${tx(x, w)},${ty(y, h)} `;
      }
      s.appendChild(createSvgEl('polyline', {
        points: pts.trim(),
        fill: 'none',
        stroke: '#5eead4',
        'stroke-width': '3'
      }));
    }
    aS.addEventListener('input', render);
    qS.addEventListener('input', render);
    cS.addEventListener('input', render);
    window.addEventListener('resize', render);
    render();
  </script>
</body>
</html>
