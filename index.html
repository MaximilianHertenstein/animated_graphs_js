<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Animated Graphs JS</title>
  <style>
    :root {
      --bg: #0d0f12;
      --panel: #151922;
      --text: #e9edf3;
      --muted: #9aa4b2;
      --accent: #4cc9f0;
      --border: #232a36;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      font-family: "Segoe UI", "Noto Sans", sans-serif;
      background:
        radial-gradient(900px 450px at 10% -10%, #1a2537 0%, transparent 65%),
        radial-gradient(800px 400px at 100% 0%, #202733 0%, transparent 60%),
        var(--bg);
      color: var(--text);
    }

    .wrap {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 2rem;
    }

    .card {
      width: min(760px, 100%);
      background: linear-gradient(160deg, rgba(255, 255, 255, 0.03), rgba(255, 255, 255, 0.01));
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 1.5rem;
      box-shadow: 0 12px 36px rgba(0, 0, 0, 0.35);
    }

    h1 {
      margin: 0 0 0.5rem;
      font-size: clamp(1.35rem, 2.2vw, 1.8rem);
      letter-spacing: 0.02em;
    }

    p {
      margin: 0 0 1.25rem;
      color: var(--muted);
    }

    nav {
      display: grid;
      gap: 0.75rem;
    }

    a {
      text-decoration: none;
      color: var(--text);
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 0.85rem 1rem;
      transition: transform 0.16s ease, border-color 0.16s ease, background-color 0.16s ease;
    }

    a:hover,
    a:focus-visible {
      transform: translateY(-1px);
      border-color: var(--accent);
      background: #1a2130;
      outline: none;
    }

    .file {
      color: var(--accent);
      font-weight: 600;
    }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="card">
      <h1>Projektstart</h1>
      <p>Wähle eine Seite aus, um direkt zu starten.</p>
      <nav>
        <a href="ExponentialfunktionTransformationen.html">
          <span class="file">ExponentialfunktionTransformationen.html</span>
        </a>
        <a href="test.html">
          <span class="file">test.html</span>
        </a>
      </nav>
    </section>
  </main>
</body>
</html>
