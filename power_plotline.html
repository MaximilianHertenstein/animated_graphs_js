<!doctype html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Power Function (plotLine.js)</title>
  <link rel="stylesheet" href="shared-app.css">
  <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
  <script src="https://polarwinkel.github.io/plotLine.js/plotLine.js"></script>
  <script src="shared-power.js"></script>
</head>
<body>
  <main class="app">
    <section class="controls">
      <div class="row"><label for="a">a</label><input id="a" type="range" min="-5" max="5" step="0.1" value="1"><output id="aOut">1.0</output></div>
      <div class="row"><label for="n">n</label><input id="n" type="range" min="-4" max="8" step="1" value="2"><output id="nOut">2</output></div>
    </section>
    <div id="formula" class="formula">\(f(x)=1.0\cdot x^{2}\)</div>
    <div id="plot" class="plot-surface"></div>
  </main>

  <script>
    const ui = PowerShared.getPowerUI("plot");

    function buildSegments(a, n) {
      const points = PowerShared.sampleVisiblePoints(a, n, 800);
      const segments = [];
      let segment = [];

      for (const point of points) {
        if (point.y === null) {
          if (segment.length > 1) segments.push(segment);
          segment = [];
          continue;
        }
        segment.push([point.x, point.y]);
      }

      if (segment.length > 1) segments.push(segment);
      return segments;
    }

    function render() {
      const { a, n } = PowerShared.syncPowerUI(ui);
      ui.plotEl.replaceChildren();

      const plot = new plotLine({
        id: "plot",
        width: "100%",
        height: "100%",
        grid: "both",
        x_axis: true,
        y_axis: true,
      });

      const graphOpts = {
        color: "#67d6ff",
        drawpoints: false,
        line: "line",
      };

      // Keep a fixed plotting window by pinning scale bounds invisibly.
      plot.addGraph("bounds", { line: "none", drawpoints: false });
      plot.addPoints("bounds", [
        [PowerShared.X_MIN, PowerShared.Y_MIN],
        [PowerShared.X_MAX, PowerShared.Y_MAX],
      ]);

      const segments = buildSegments(a, n);
      segments.forEach((segment, index) => {
        const graphName = `f${index}`;
        plot.addGraph(graphName, graphOpts);
        plot.addPoints(graphName, segment);
      });

      plot.draw();
    }

    PowerShared.bindPowerUI(ui, render);
    render();
  </script>
</body>
</html>
