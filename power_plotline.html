<!doctype html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Power Function (plotLine.js)</title>
  <link rel="stylesheet" href="shared-app.css">
  <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
</head>
<body>
  <main class="app">
    <section class="controls">
      <div class="row"><label for="a">a</label><input id="a" type="range" min="-5" max="5" step="0.1" value="1"><output id="aOut">1.0</output></div>
      <div class="row"><label for="n">n</label><input id="n" type="range" min="-4" max="8" step="1" value="2"><output id="nOut">2</output></div>
    </section>
    <div id="formula" class="formula">\(f(x)=1.0\cdot x^{2}\)</div>
    <canvas id="plot" class="plot-surface"></canvas>
  </main>

  <script src="plotLine.js"></script>
  <script>
    const aS = document.getElementById("a");
    const nS = document.getElementById("n");
    const aOut = document.getElementById("aOut");
    const nOut = document.getElementById("nOut");
    const formula = document.getElementById("formula");
    const canvas = document.getElementById("plot");

    function render() {
      const a = parseFloat(aS.value);
      const n = parseInt(nS.value, 10);
      aOut.textContent = a.toFixed(1);
      nOut.textContent = String(n);
      formula.innerHTML = `\\(f(x)=${a.toFixed(1)}\\cdot x^{${n}}\\)`;
      if (window.MathJax && MathJax.typesetPromise) {
        MathJax.typesetPromise([formula]).catch(() => {});
      }
      plotLine(canvas, (x) => a * Math.pow(Math.abs(x), n) * (x < 0 && n % 2 !== 0 ? -1 : 1), { minX: -5, maxX: 5, minY: -5, maxY: 5 });
    }

    aS.addEventListener("input", render);
    nS.addEventListener("input", render);
    window.addEventListener("resize", render);
    render();
  </script>
</body>
</html>
