<!doctype html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Power Function (JSXGraph)</title>
  <link rel="stylesheet" href="shared-app.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/jsxgraph/distrib/jsxgraph.css">
  <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
  <script src="shared-power.js"></script>
  <style>
    .jxgbox {
      position: relative;
      overflow: hidden;
      touch-action: none;
    }

    .jxgbox svg,
    .jxgbox canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
    }

    #box {
      background: #121826 !important;
    }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/jsxgraph/distrib/jsxgraphcore.js"></script>
</head>
<body>
  <main class="app">
    <section class="controls">
      <div class="row"><label for="a">a</label><input id="a" type="range" min="-5" max="5" step="0.1" value="1"><output id="aOut">1.0</output></div>
      <div class="row"><label for="n">n</label><input id="n" type="range" min="-4" max="8" step="1" value="2"><output id="nOut">2</output></div>
    </section>
    <div id="formula" class="formula">\(f(x)=1.0\cdot x^{2}\)</div>
    <div id="box" class="plot-surface jxgbox"></div>
  </main>

  <script>
    function loadFallbackAndBoot() {
      const s = document.createElement('script');
      s.src = 'https://cdnjs.cloudflare.com/ajax/libs/jsxgraph/1.8.0/jsxgraphcore.js';
      s.onload = boot;
      s.onerror = () => {
        document.getElementById('box').textContent = 'JSXGraph konnte nicht geladen werden.';
      };
      document.head.appendChild(s);
    }

    const aS = document.getElementById('a');
    const nS = document.getElementById('n');
    const aOut = document.getElementById('aOut');
    const nOut = document.getElementById('nOut');
    const formula = document.getElementById('formula');
    const box = document.getElementById('box');
    let a = 1;
    let n = 2;
    let board;
    let graph;

    function boot() {
      if (typeof JXG === 'undefined') {
        box.textContent = 'JSXGraph konnte nicht geladen werden.';
        return;
      }

      board = JXG.JSXGraph.initBoard('box', {
        boundingbox: [-5, 5, 5, -5],
        axis: true,
        grid: true,
        pan: { enabled: false },
        zoom: { enabled: false },
        showNavigation: false,
        showCopyright: false,
        keepAspectRatio: false
      });

      box.style.background = '#121826';

      try {
        if (board.defaultAxes && board.defaultAxes.x && board.defaultAxes.y) {
          board.defaultAxes.x.setAttribute({ strokeColor: '#f6f8fb' });
          board.defaultAxes.y.setAttribute({ strokeColor: '#f6f8fb' });
        }
        board.setAttribute({
          grid: {
            strokeColor: 'rgba(255,255,255,0.15)',
            strokeWidth: 1,
          }
        });
      } catch (e) {
        // Keep running even if optional style attributes are unsupported.
      }

      graph = board.create('functiongraph', [
        (x) => PowerShared.powerY(a, n, x),
        -5,
        5
      ], {
        strokeColor: '#5eead4',
        strokeWidth: 3,
        highlight: false,
      });

      board.resizeContainer(box.clientWidth, box.clientHeight, true);
      render();
    }

    function render() {
      ({ a, n } = PowerShared.getParams(aS, nS, aOut, nOut));
      PowerShared.updatePowerFormula(formula, a, n);
      if (graph) graph.Y = (x) => PowerShared.powerY(a, n, x);
      if (board) board.update();
    }

    aS.addEventListener('input', render);
    nS.addEventListener('input', render);
    window.addEventListener('resize', () => {
      if (board) board.resizeContainer(box.clientWidth, box.clientHeight, true);
    });

    if (typeof JXG === 'undefined') {
      loadFallbackAndBoot();
    } else {
      boot();
    }
  </script>
</body>
</html>
