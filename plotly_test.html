<!doctype html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Power Function (Plotly)</title>
  <link rel="stylesheet" href="shared-app.css">
  <script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
  <script src="shared-power.js"></script>
</head>
<body>
  <main class="app">
    <section class="controls">
      <div class="row"><label for="a">a</label><input id="a" type="range" min="-5" max="5" step="0.1" value="1"><output id="aOut">1.0</output></div>
      <div class="row"><label for="n">n</label><input id="n" type="range" min="-4" max="8" step="1" value="2"><output id="nOut">2</output></div>
    </section>
    <div id="formula" class="formula">\(f(x)=1.0\cdot x^{2}\)</div>
    <div id="plot" class="plot-surface"></div>
  </main>

  <script>
    const aS = document.getElementById('a');
    const nS = document.getElementById('n');
    const aO = document.getElementById('aOut');
    const nO = document.getElementById('nOut');
    const formula = document.getElementById('formula');
    const plotEl = document.getElementById('plot');

    function data(a, n) {
      const points = PowerShared.sampleVisiblePoints(a, n, 3000);
      const x = points.map((point) => point.x);
      const y = points.map((point) => point.y);
      return { x, y };
    }

    function render() {
      if (typeof Plotly === 'undefined' || !Plotly.react) {
        plotEl.textContent = 'Plotly konnte nicht geladen werden.';
        return;
      }

      const { a, n } = PowerShared.getParams(aS, nS, aO, nO);
      PowerShared.updatePowerFormula(formula, a, n);

      const v = data(a, n);
      Plotly.react('plot',
        [{ x: v.x, y: v.y, mode: 'lines', type: 'scatter', name: '', line: { color: '#5eead4', width: 4 }, hoverinfo: 'skip' }],
        {
          autosize: true,
          width: plotEl.clientWidth,
          height: plotEl.clientHeight,
          paper_bgcolor: '#121826',
          plot_bgcolor: '#121826',
          margin: { l: 60, r: 30, t: 30, b: 45 },
          xaxis: {
            range: [PowerShared.X_MIN, PowerShared.X_MAX],
            tickvals: PowerShared.TICKS,
            tickfont: { color: '#d7dfeb', size: 12 },
            showline: false,
            zeroline: true,
            zerolinewidth: 2,
            zerolinecolor: '#f6f8fb',
            gridcolor: 'rgba(255,255,255,.15)',
            showgrid: true
          },
          yaxis: {
            range: [PowerShared.Y_MIN, PowerShared.Y_MAX],
            tickvals: PowerShared.TICKS,
            tickfont: { color: '#d7dfeb', size: 12 },
            showline: false,
            zeroline: true,
            zerolinewidth: 2,
            zerolinecolor: '#f6f8fb',
            gridcolor: 'rgba(255,255,255,.15)',
            showgrid: true
          },
          showlegend: false
        },
        { displayModeBar: false, responsive: true }
      );
    }

    aS.addEventListener('input', render);
    nS.addEventListener('input', render);

    window.addEventListener('resize', () => {
      if (typeof Plotly !== 'undefined' && Plotly.Plots?.resize) Plotly.Plots.resize(plotEl);
    });

    render();
  </script>
</body>
</html>
