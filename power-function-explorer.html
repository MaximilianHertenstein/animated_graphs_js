<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Power Function (Canvas)</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=JetBrains+Mono:ital,wght@0,300;0,400;1,400&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --cyan: #00e5ff;
    --purple: #bf5af2;
    --bg: #05080f;
    --panel: rgba(8, 15, 28, 0.85);
    --border: rgba(0, 229, 255, 0.12);
    --text: #c8daf0;
    --muted: rgba(200, 218, 240, 0.28);
  }

  html, body {
    width: 100%; height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  /* ── animated background starfield ── */
  #bg-canvas {
    position: fixed; inset: 0;
    z-index: 0; pointer-events: none;
    opacity: 0.6;
  }

  /* ── header ── */
  header {
    position: relative; z-index: 10;
    display: flex; align-items: center;
    justify-content: space-between;
    padding: 14px 32px;
    background: var(--panel);
    border-bottom: 1px solid var(--border);
    backdrop-filter: blur(24px);
    -webkit-backdrop-filter: blur(24px);
    flex-shrink: 0;
  }

  .logo {
    font-family: 'Orbitron', sans-serif;
    font-size: 0.6rem;
    letter-spacing: 0.35em;
    text-transform: uppercase;
    color: var(--muted);
  }

  #formula-wrap {
    font-family: 'Orbitron', sans-serif;
    font-size: 1.3rem;
    font-weight: 700;
    letter-spacing: 0.04em;
    background: linear-gradient(120deg, var(--cyan), var(--purple));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    transition: opacity 0.15s;
    user-select: none;
  }

  .domain-tag {
    font-size: 0.6rem;
    color: var(--muted);
    letter-spacing: 0.12em;
  }

  /* ── main layout ── */
  #main {
    position: relative; z-index: 5;
    flex: 1; display: flex;
    overflow: hidden;
    min-height: 0;
  }

  /* ── canvas area ── */
  #plot-wrap {
    flex: 1; position: relative;
    min-width: 0; min-height: 0;
  }

  #plot {
    display: block;
    width: 100%; height: 100%;
    cursor: crosshair;
  }

  /* ── tooltip ── */
  #tooltip {
    position: absolute;
    font-size: 0.7rem;
    color: var(--cyan);
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.15s;
    background: rgba(5, 8, 15, 0.82);
    border: 1px solid rgba(0,229,255,0.25);
    border-radius: 6px;
    padding: 4px 10px;
    white-space: nowrap;
    backdrop-filter: blur(8px);
  }

  /* ── side panel ── */
  #panel {
    width: 230px;
    flex-shrink: 0;
    background: var(--panel);
    border-left: 1px solid var(--border);
    backdrop-filter: blur(24px);
    -webkit-backdrop-filter: blur(24px);
    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: 0;
    padding: 40px 28px;
    overflow: hidden;
  }

  .param-block {
    display: flex; flex-direction: column;
    gap: 10px;
    padding-bottom: 36px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 36px;
  }
  .param-block:last-of-type {
    border-bottom: none; margin-bottom: 0; padding-bottom: 0;
  }

  .param-header {
    display: flex; align-items: baseline;
    justify-content: space-between;
  }

  .param-name {
    font-family: 'Orbitron', sans-serif;
    font-size: 0.58rem;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--muted);
  }

  .param-value {
    font-family: 'Orbitron', sans-serif;
    font-size: 1.85rem;
    font-weight: 900;
    line-height: 1;
    background: linear-gradient(135deg, var(--cyan), var(--purple));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    transition: transform 0.12s;
    min-width: 56px;
    text-align: right;
  }
  .param-value.bump { transform: scale(1.18); }

  /* custom slider */
  .slider-row {
    position: relative;
    height: 20px;
    display: flex; align-items: center;
  }

  .track-bg {
    position: absolute; left: 0; right: 0;
    height: 3px;
    background: rgba(255,255,255,0.07);
    border-radius: 2px;
    pointer-events: none;
  }

  .track-fill {
    position: absolute; left: 0;
    height: 3px;
    background: linear-gradient(90deg, var(--cyan), var(--purple));
    border-radius: 2px;
    pointer-events: none;
    transition: width 0.05s;
  }

  input[type=range] {
    -webkit-appearance: none;
    position: absolute; left: 0; right: 0;
    width: 100%;
    height: 20px;
    background: transparent;
    cursor: pointer;
    outline: none;
  }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 16px; height: 16px;
    border-radius: 50%;
    background: #fff;
    border: 2px solid var(--cyan);
    box-shadow: 0 0 0 0 rgba(0,229,255,0);
    transition: box-shadow 0.2s, transform 0.15s;
  }
  input[type=range]:active::-webkit-slider-thumb,
  input[type=range]:hover::-webkit-slider-thumb {
    box-shadow: 0 0 0 6px rgba(0,229,255,0.18), 0 0 14px rgba(0,229,255,0.45);
    transform: scale(1.25);
  }
  input[type=range]::-moz-range-thumb {
    width: 16px; height: 16px;
    border-radius: 50%;
    background: #fff;
    border: 2px solid var(--cyan);
    cursor: pointer;
  }

  .tick-row {
    display: flex; justify-content: space-between;
    font-size: 0.6rem;
    color: rgba(255,255,255,0.15);
    margin-top: 2px;
    user-select: none;
  }

  /* ── info footer inside panel ── */
  .panel-footer {
    margin-top: 28px;
    padding-top: 20px;
    border-top: 1px solid var(--border);
    font-size: 0.58rem;
    line-height: 2;
    color: rgba(255,255,255,0.18);
    letter-spacing: 0.06em;
  }
  .panel-footer span { color: rgba(0,229,255,0.35); }

  /* ── corner badge ── */
  #badge {
    position: absolute;
    right: 16px; bottom: 16px;
    z-index: 10;
    font-size: 0.55rem;
    letter-spacing: 0.15em;
    color: rgba(255,255,255,0.12);
  }
</style>
</head>
<body>

<canvas id="bg-canvas"></canvas>

<header>
  <div class="logo">Power Function Explorer</div>
  <div id="formula-wrap">\(f(x)=1.0\cdot x^{2}\)</div>
  <div class="domain-tag">x ∈ [−5, 5]</div>
</header>

<div id="main">
  <div id="plot-wrap">
    <canvas id="plot"></canvas>
    <div id="tooltip"></div>
  </div>

  <div id="panel">

    <div class="param-block">
      <div class="param-header">
        <div class="param-name">Coefficient — a</div>
        <div class="param-value" id="aval">1.0</div>
      </div>
      <div class="slider-row">
        <div class="track-bg"></div>
        <div class="track-fill" id="afill" style="width:60%"></div>
        <input type="range" id="a" min="-5" max="5" step="0.1" value="1">
      </div>
      <div class="tick-row"><span>−5</span><span>0</span><span>5</span></div>
    </div>

    <div class="param-block">
      <div class="param-header">
        <div class="param-name">Exponent — n</div>
        <div class="param-value" id="nval">2</div>
      </div>
      <div class="slider-row">
        <div class="track-bg"></div>
        <div class="track-fill" id="nfill" style="width:70%"></div>
        <input type="range" id="n" min="-5" max="5" step="1" value="2">
      </div>
      <div class="tick-row"><span>−5</span><span>−2</span><span>0</span><span>2</span><span>5</span></div>
    </div>

    <div class="panel-footer">
      <div>range clipped to <span>y ∈ [−6, 6]</span></div>
      <div>integer exponents only</div>
      <div style="margin-top:8px; color:rgba(0,229,255,0.28)">drag to animate ↕</div>
    </div>

  </div>
</div>

<div id="badge">© power function explorer</div>

<script>
/* ─── Starfield background ─── */
(function() {
  const bc = document.getElementById('bg-canvas');
  const bx = bc.getContext('2d');
  let bw, bh;
  const STARS = 180;
  const stars = [];

  function initStars() {
    bw = bc.width  = window.innerWidth;
    bh = bc.height = window.innerHeight;
    stars.length = 0;
    for (let i = 0; i < STARS; i++) {
      stars.push({
        x: Math.random() * bw,
        y: Math.random() * bh,
        r: Math.random() * 1.2 + 0.2,
        a: Math.random(),
        speed: Math.random() * 0.004 + 0.001,
        phase: Math.random() * Math.PI * 2
      });
    }
  }

  function drawStars(t) {
    bx.clearRect(0, 0, bw, bh);
    for (const s of stars) {
      const alpha = 0.15 + 0.65 * (0.5 + 0.5 * Math.sin(t * s.speed + s.phase));
      bx.beginPath();
      bx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
      bx.fillStyle = `rgba(180,210,255,${alpha})`;
      bx.fill();
    }
    requestAnimationFrame(drawStars);
  }

  window.addEventListener('resize', initStars);
  initStars();
  requestAnimationFrame(drawStars);
})();

/* ─── Main plot ─── */
const canvas  = document.getElementById('plot');
const ctx     = canvas.getContext('2d');
const tooltip = document.getElementById('tooltip');

const XMIN = -5, XMAX = 5, YMIN = -6, YMAX = 6;
const MARGIN = { top: 32, right: 28, bottom: 44, left: 52 };
let W = 0, H = 0;

/* state: targets & current (animated) */
let aT = 1, nT = 2;
let aC = 1, nC = 2;
let mouseX = null, mouseY = null;

/* resize */
function resize() {
  const wrap = document.getElementById('plot-wrap');
  const dpr = window.devicePixelRatio || 1;
  W = wrap.clientWidth;
  H = wrap.clientHeight;
  canvas.width  = W * dpr;
  canvas.height = H * dpr;
  canvas.style.width  = W + 'px';
  canvas.style.height = H + 'px';
  ctx.scale(dpr, dpr);
}

/* coordinate mapping */
function tx(xv) {
  return MARGIN.left + (xv - XMIN) / (XMAX - XMIN) * (W - MARGIN.left - MARGIN.right);
}
function ty(yv) {
  return MARGIN.top  + (YMAX - yv) / (YMAX - YMIN) * (H - MARGIN.top  - MARGIN.bottom);
}
function fromCanvasX(px) {
  return XMIN + (px - MARGIN.left) / (W - MARGIN.left - MARGIN.right) * (XMAX - XMIN);
}
function fromCanvasY(py) {
  return YMAX - (py - MARGIN.top)  / (H - MARGIN.top  - MARGIN.bottom) * (YMAX - YMIN);
}

/* safe pow */
function safePow(x, n) {
  if (x === 0 && n <= 0) return n === 0 ? 1 : null;
  if (x < 0 && !Number.isInteger(n)) return null;
  return Math.pow(x, n);
}

/* gradient along x */
function gradColor(t) {
  /* cyan (0,229,255) → purple (191,90,242) */
  const r = Math.round(0   + t * 191);
  const g = Math.round(229 - t * 139);
  const b = Math.round(255 - t * 13);
  return [r, g, b];
}

/* ─── draw ─── */
function draw(a, n) {
  ctx.clearRect(0, 0, W, H);

  drawGrid();
  drawAxes();
  drawCurve(a, n);
  if (mouseX !== null) drawCrosshair(a, n);
}

function drawGrid() {
  for (let v = XMIN; v <= XMAX; v++) {
    const gx = tx(v), gy0 = ty(YMIN), gy1 = ty(YMAX);
    ctx.beginPath();
    ctx.moveTo(gx, gy0); ctx.lineTo(gx, gy1);
    ctx.strokeStyle = v === 0 ? 'rgba(0,229,255,0.13)' : 'rgba(255,255,255,0.035)';
    ctx.lineWidth   = v === 0 ? 1 : 0.5;
    ctx.stroke();
  }
  for (let v = YMIN; v <= YMAX; v++) {
    const gy = ty(v), gx0 = tx(XMIN), gx1 = tx(XMAX);
    ctx.beginPath();
    ctx.moveTo(gx0, gy); ctx.lineTo(gx1, gy);
    ctx.strokeStyle = v === 0 ? 'rgba(0,229,255,0.13)' : 'rgba(255,255,255,0.035)';
    ctx.lineWidth   = v === 0 ? 1 : 0.5;
    ctx.stroke();
  }
}

function drawAxes() {
  ctx.save();
  ctx.font = '11px JetBrains Mono, monospace';
  ctx.fillStyle = 'rgba(200,218,240,0.22)';

  /* x-axis */
  ctx.strokeStyle = 'rgba(0,229,255,0.28)';
  ctx.lineWidth = 1.2;
  ctx.beginPath();
  ctx.moveTo(tx(XMIN) - 2, ty(0));
  ctx.lineTo(tx(XMAX) + 12, ty(0));
  ctx.stroke();
  /* arrow */
  const ax = tx(XMAX) + 12, ay = ty(0);
  ctx.fillStyle = 'rgba(0,229,255,0.4)';
  ctx.beginPath();
  ctx.moveTo(ax + 7, ay);
  ctx.lineTo(ax, ay - 4);
  ctx.lineTo(ax, ay + 4);
  ctx.fill();

  /* y-axis */
  ctx.strokeStyle = 'rgba(0,229,255,0.28)';
  ctx.lineWidth = 1.2;
  ctx.beginPath();
  ctx.moveTo(tx(0), ty(YMIN) + 2);
  ctx.lineTo(tx(0), ty(YMAX) - 12);
  ctx.stroke();
  const bx2 = tx(0), by = ty(YMAX) - 12;
  ctx.fillStyle = 'rgba(0,229,255,0.4)';
  ctx.beginPath();
  ctx.moveTo(bx2, by - 7);
  ctx.lineTo(bx2 - 4, by);
  ctx.lineTo(bx2 + 4, by);
  ctx.fill();

  /* tick labels */
  ctx.font = '10px JetBrains Mono, monospace';

  /* x ticks */
  ctx.textAlign = 'center';
  ctx.textBaseline = 'top';
  ctx.fillStyle = 'rgba(200,218,240,0.22)';
  for (let v = XMIN; v <= XMAX; v++) {
    if (v === 0) continue;
    const px = tx(v), py = ty(0);
    ctx.beginPath();
    ctx.moveTo(px, py - 4); ctx.lineTo(px, py + 4);
    ctx.strokeStyle = 'rgba(0,229,255,0.2)';
    ctx.lineWidth = 0.8;
    ctx.stroke();
    ctx.fillText(v, px, py + 7);
  }

  /* y ticks */
  ctx.textAlign = 'right';
  ctx.textBaseline = 'middle';
  for (let v = YMIN; v <= YMAX; v++) {
    if (v === 0) continue;
    const px = tx(0), py = ty(v);
    ctx.beginPath();
    ctx.moveTo(px - 4, py); ctx.lineTo(px + 4, py);
    ctx.strokeStyle = 'rgba(0,229,255,0.2)';
    ctx.lineWidth = 0.8;
    ctx.stroke();
    ctx.fillText(v, px - 7, py);
  }

  /* axis labels */
  ctx.font = 'italic 12px JetBrains Mono, monospace';
  ctx.fillStyle = 'rgba(0,229,255,0.45)';
  ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
  ctx.fillText('x', tx(XMAX) + 20, ty(0));
  ctx.textAlign = 'center'; ctx.textBaseline = 'bottom';
  ctx.fillText('y', tx(0), ty(YMAX) - 18);

  ctx.restore();
}

function buildPoints(a, n, steps) {
  const pts = [];
  for (let i = 0; i <= steps; i++) {
    const xv = XMIN + (XMAX - XMIN) * i / steps;
    const yv = a * (safePow(xv, n) ?? NaN);
    if (!isFinite(yv) || Math.abs(yv) > YMAX + 0.5) {
      pts.push(null);
    } else {
      pts.push({ xv, yv, px: tx(xv), py: ty(yv) });
    }
  }
  return pts;
}

function drawCurvePath(pts, lineWidth, alpha) {
  const segs = [];
  let cur = [];
  for (const p of pts) {
    if (!p) { if (cur.length > 1) segs.push(cur); cur = []; }
    else cur.push(p);
  }
  if (cur.length > 1) segs.push(cur);

  for (const seg of segs) {
    if (seg.length < 2) continue;

    /* use one gradient across horizontal span */
    const x0 = seg[0].px, x1 = seg[seg.length - 1].px;
    let grad;
    if (Math.abs(x1 - x0) < 1) {
      const [r, g, b] = gradColor((seg[0].xv - XMIN) / (XMAX - XMIN));
      ctx.strokeStyle = `rgba(${r},${g},${b},${alpha})`;
    } else {
      grad = ctx.createLinearGradient(x0, 0, x1, 0);
      const t0 = (seg[0].xv - XMIN) / (XMAX - XMIN);
      const t1 = (seg[seg.length-1].xv - XMIN) / (XMAX - XMIN);
      const [r0,g0,b0] = gradColor(t0);
      const [r1,g1,b1] = gradColor(t1);
      grad.addColorStop(0, `rgba(${r0},${g0},${b0},${alpha})`);
      grad.addColorStop(1, `rgba(${r1},${g1},${b1},${alpha})`);
      ctx.strokeStyle = grad;
    }

    ctx.lineWidth = lineWidth;
    ctx.lineCap  = 'round';
    ctx.lineJoin = 'round';
    ctx.beginPath();
    ctx.moveTo(seg[0].px, seg[0].py);
    for (let i = 1; i < seg.length; i++) {
      ctx.lineTo(seg[i].px, seg[i].py);
    }
    ctx.stroke();
  }
}

function drawCurve(a, n) {
  const pts = buildPoints(a, n, 1800);

  /* multi-pass glow */
  const passes = [
    { w: 22, alpha: 0.03 },
    { w: 12, alpha: 0.06 },
    { w:  6, alpha: 0.12 },
    { w:  2.5, alpha: 0.9 },
  ];
  for (const p of passes) drawCurvePath(pts, p.w, p.alpha);
}

/* crosshair + tooltip */
function drawCrosshair(a, n) {
  const xv = fromCanvasX(mouseX);
  if (xv < XMIN || xv > XMAX) return;
  const raw = a * (safePow(xv, n) ?? NaN);
  if (!isFinite(raw)) return;
  const yv = Math.max(YMIN, Math.min(YMAX, raw));
  const px = tx(xv), py = ty(yv);

  /* vertical line */
  ctx.save();
  ctx.setLineDash([4, 6]);
  ctx.strokeStyle = 'rgba(0,229,255,0.2)';
  ctx.lineWidth = 0.8;
  ctx.beginPath();
  ctx.moveTo(px, ty(YMIN)); ctx.lineTo(px, ty(YMAX));
  ctx.stroke();
  ctx.setLineDash([]);

  /* dot */
  if (raw >= YMIN && raw <= YMAX) {
    const t = (xv - XMIN) / (XMAX - XMIN);
    const [r, g, b] = gradColor(t);
    ctx.beginPath();
    ctx.arc(px, py, 5, 0, Math.PI * 2);
    ctx.fillStyle = `rgb(${r},${g},${b})`;
    ctx.shadowColor = `rgb(${r},${g},${b})`;
    ctx.shadowBlur = 12;
    ctx.fill();
    ctx.shadowBlur = 0;

    /* ring */
    ctx.beginPath();
    ctx.arc(px, py, 9, 0, Math.PI * 2);
    ctx.strokeStyle = `rgba(${r},${g},${b},0.35)`;
    ctx.lineWidth = 1;
    ctx.stroke();
  }
  ctx.restore();

  /* tooltip */
  const tip = document.getElementById('tooltip');
  tip.textContent = `x = ${xv.toFixed(2)}  →  f(x) = ${raw.toFixed(3)}`;
  tip.style.opacity = '1';
  let tx2 = mouseX + 14, ty2 = mouseY - 28;
  if (tx2 + 180 > W) tx2 = mouseX - 190;
  tip.style.left = tx2 + 'px';
  tip.style.top  = ty2 + 'px';
}

/* ─── animation loop ─── */
let lastTs = 0;
function loop(ts) {
  const dt = Math.min((ts - lastTs) / 1000, 0.05);
  lastTs = ts;

  const k = Math.min(1, 10 * dt);
  aC += (aT - aC) * k;
  nC += (nT - nC) * k;

  if (Math.abs(aT - aC) < 0.0005) aC = aT;
  if (Math.abs(nT - nC) < 0.0005) nC = nT;

  draw(aC, nC);
  requestAnimationFrame(loop);
}

/* ─── formula display ─── */
function updateFormula() {
  const a = aT, n = nT;
  const aStr = a.toFixed(1);
  const formula = document.getElementById('formula-wrap');
  formula.innerHTML = `\\(f(x)=${aStr}\\cdot x^{${n}}\\)`;
  if (window.MathJax && MathJax.typesetPromise) {
    MathJax.typesetPromise([formula]).catch(() => {});
  }
}

/* ─── slider update ─── */
function setFill(fillId, val, min, max) {
  const pct = (val - min) / (max - min) * 100;
  document.getElementById(fillId).style.width = pct.toFixed(1) + '%';
}

function bump(elId) {
  const el = document.getElementById(elId);
  el.classList.add('bump');
  setTimeout(() => el.classList.remove('bump'), 200);
}

document.getElementById('a').addEventListener('input', function() {
  aT = parseFloat(this.value);
  document.getElementById('aval').textContent = aT.toFixed(1);
  setFill('afill', aT, -5, 5);
  bump('aval');
  updateFormula();
});

document.getElementById('n').addEventListener('input', function() {
  nT = parseInt(this.value);
  document.getElementById('nval').textContent = nT;
  setFill('nfill', nT, -5, 5);
  bump('nval');
  updateFormula();
});

/* ─── mouse tracking ─── */
canvas.addEventListener('mousemove', function(e) {
  const rect = canvas.getBoundingClientRect();
  mouseX = e.clientX - rect.left;
  mouseY = e.clientY - rect.top;
});
canvas.addEventListener('mouseleave', function() {
  mouseX = null; mouseY = null;
  document.getElementById('tooltip').style.opacity = '0';
});

/* ─── init ─── */
window.addEventListener('resize', () => { resize(); draw(aC, nC); });
resize();
setFill('afill', aT, -5, 5);
setFill('nfill', nT, -5, 5);
updateFormula();
requestAnimationFrame(loop);
</script>
</body>
</html>
