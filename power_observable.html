<!doctype html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Power Function (Observable Plot)</title>
  <link rel="stylesheet" href="shared-app.css">
  <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
  <script src="shared-power.js"></script>
</head>
<body>
  <main class="app">
    <section class="controls">
      <div class="row"><label for="a">a</label><input id="a" type="range" min="-5" max="5" step="0.1" value="1"><output id="aOut">1.0</output></div>
      <div class="row"><label for="n">n</label><input id="n" type="range" min="-4" max="8" step="1" value="2"><output id="nOut">2</output></div>
    </section>
    <div id="formula" class="formula">\(f(x)=1.0\cdot x^{2}\)</div>
    <div id="plot" class="plot-surface"></div>
  </main>

  <script type="module">
    import * as Plot from "https://cdn.jsdelivr.net/npm/@observablehq/plot@0.6/+esm";

    const aS = document.getElementById("a");
    const nS = document.getElementById("n");
    const aOut = document.getElementById("aOut");
    const nOut = document.getElementById("nOut");
    const formula = document.getElementById("formula");
    const el = document.getElementById("plot");

    function data(a, n) {
      return window.PowerShared.samplePoints(a, n, 3000, -5, 5).map((point) => ({
        x: point.x,
        y: Number.isFinite(point.y) && point.y >= -5 && point.y <= 5 ? point.y : null,
      }));
    }

    function render() {
      const { a, n } = window.PowerShared.getParams(aS, nS, aOut, nOut);
      window.PowerShared.updatePowerFormula(formula, a, n);

      const fig = Plot.plot({
        width: el.clientWidth,
        height: el.clientHeight,
        marginLeft: 56,
        marginBottom: 40,
        marginTop: 24,
        marginRight: 24,
        x: { domain: [-5, 5], ticks: window.PowerShared.TICKS, label: "" },
        y: { domain: [-5, 5], ticks: window.PowerShared.TICKS, label: "" },
        style: { background: "#121826", color: "#d7dfeb" },
        marks: [
          Plot.ruleX(window.PowerShared.TICKS.filter((value) => value !== 0), { stroke: "rgba(255,255,255,0.32)", strokeWidth: 1.2 }),
          Plot.ruleY(window.PowerShared.TICKS.filter((value) => value !== 0), { stroke: "rgba(255,255,255,0.32)", strokeWidth: 1.2 }),
          Plot.ruleX([0], { stroke: "#f6f8fb", strokeWidth: 1.5 }),
          Plot.ruleY([0], { stroke: "#f6f8fb", strokeWidth: 1.5 }),
          Plot.line(data(a, n), { x: "x", y: "y", stroke: "#5eead4", strokeWidth: 3 })
        ]
      });

      el.replaceChildren(fig);
    }

    aS.addEventListener("input", render);
    nS.addEventListener("input", render);
    window.addEventListener("resize", render);
    render();
  </script>
</body>
</html>
