<!doctype html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Power Function (Chart.js)</title>
  <link rel="stylesheet" href="shared-app.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
  <script src="shared-power.js"></script>
</head>
<body>
  <main class="app">
    <section class="controls">
      <div class="row"><label for="a">a</label><input id="a" type="range" min="-5" max="5" step="0.1" value="1"><output id="aOut">1.0</output></div>
      <div class="row"><label for="n">n</label><input id="n" type="range" min="-4" max="8" step="1" value="2"><output id="nOut">2</output></div>
    </section>
    <div id="formula" class="formula">\(f(x)=1.0\cdot x^{2}\)</div>
    <canvas id="chart" class="plot-surface"></canvas>
  </main>

  <script>
    const ui = PowerShared.getPowerUI('chart');
    const ctx = ui.plotEl.getContext('2d');

    function data(a, n) {
      const points = [];
      for (let i = 0; i <= 2000; i++) {
        const x = -5 + (10 * i / 2000);
        const y = PowerShared.powerY(a, n, x);
        points.push({ x, y });
      }
      return points;
    }

    const chart = new Chart(ctx, {
      type: 'line',
      data: { datasets: [{ data: [], borderColor: '#5eead4', borderWidth: 3, pointRadius: 0 }] },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        animation: false,
        plugins: { legend: { display: false } },
        scales: {
          x: {
            type: 'linear',
            min: PowerShared.X_MIN,
            max: PowerShared.X_MAX,
            position: 'center',
            ticks: { stepSize: 1, color: '#d7dfeb' },
            grid: { color: 'rgba(255,255,255,.15)' },
            border: { color: '#f6f8fb', width: 2 }
          },
          y: {
            min: PowerShared.Y_MIN,
            max: PowerShared.Y_MAX,
            position: 'center',
            ticks: { stepSize: 1, color: '#d7dfeb' },
            grid: { color: 'rgba(255,255,255,.15)' },
            border: { color: '#f6f8fb', width: 2 }
          }
        }
      }
    });

    function render() {
      const { a, n } = PowerShared.syncPowerUI(ui);
      chart.data.datasets[0].data = data(a, n);
      chart.update();
    }

    PowerShared.bindPowerUI(ui, render, null);
    render();
  </script>
</body>
</html>
