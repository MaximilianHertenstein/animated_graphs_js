<!doctype html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ax^n Explorer (MJS Plot)</title>
  <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      height: 100vh;
      background: #0f1117;
      color: #e7ecf3;
      font-family: "Segoe UI", system-ui, sans-serif;
      overflow: hidden;
    }
    .card {
      width: 100vw;
      min-height: 100vh;
      background: #171b24;
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 0;
      padding: 20px;
    }
    h1 {
      margin: 0 0 8px;
      font-size: 1.2rem;
      font-weight: 600;
    }
    .formula {
      margin: 0 0 14px;
      color: #aab5c5;
      min-height: 32px;
      font-size: 1.1rem;
    }
    .controls {
      display: grid;
      gap: 10px;
      margin-bottom: 14px;
    }
    .row {
      display: grid;
      grid-template-columns: 26px 1fr 56px;
      align-items: center;
      gap: 10px;
    }
    .row label {
      color: #aab5c5;
      font-family: "Cascadia Code", "Consolas", monospace;
    }
    .row output {
      text-align: right;
      color: #e7ecf3;
      font-family: "Cascadia Code", "Consolas", monospace;
    }
    #plot {
      width: 100%;
      height: calc(100vh - 180px);
      min-height: 380px;
      border-radius: 10px;
      overflow: hidden;
      background: #111722;
    }
    #plot svg {
      width: 100%;
      height: 100%;
      display: block;
    }
    .axis,
    .axis text {
      color: #d7dfeb;
      fill: #d7dfeb;
      font-family: "Cascadia Code", "Consolas", monospace;
      font-size: 12px;
    }
    .axis path,
    .axis line {
      stroke: rgba(255,255,255,0.45);
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>ax^n Explorer (MJS Plot)</h1>
    <p class="formula" id="formula">\(f(x)=1.0\cdot x^{2}\)</p>

    <section class="controls">
      <div class="row">
        <label for="a">a</label>
        <input id="a" type="range" min="-5" max="5" step="0.1" value="1">
        <output id="aOut">1.0</output>
      </div>
      <div class="row">
        <label for="n">n</label>
        <input id="n" type="range" min="-4" max="8" step="1" value="2">
        <output id="nOut">2</output>
      </div>
    </section>

    <div id="plot"></div>
  </main>

  <script type="module">
    import * as d3 from "https://cdn.jsdelivr.net/npm/d3@7/+esm";

    const aSlider = document.getElementById("a");
    const nSlider = document.getElementById("n");
    const aOut = document.getElementById("aOut");
    const nOut = document.getElementById("nOut");
    const formula = document.getElementById("formula");
    const plotEl = document.getElementById("plot");

    function updateFormula(a, n) {
      formula.innerHTML = `\\(f(x)=${a.toFixed(1)}\\cdot x^{${n}}\\)`;
      if (window.MathJax && MathJax.typesetPromise) {
        MathJax.typesetPromise([formula]).catch(() => {});
      }
    }

    function buildData(a, n) {
      const data = [];
      const steps = 4000;
      for (let i = 0; i <= steps; i++) {
        const x = -5 + (10 * i) / steps;
        const y = a * Math.pow(Math.abs(x), n) * (x < 0 && n % 2 !== 0 ? -1 : 1);
        if (Number.isFinite(y)) data.push({ x, y });
      }
      return data;
    }

    function render() {
      const a = parseFloat(aSlider.value);
      const n = parseInt(nSlider.value, 10);
      aOut.value = a.toFixed(1);
      nOut.value = String(n);
      updateFormula(a, n);

      const width = Math.max(320, plotEl.clientWidth);
      const height = Math.max(380, plotEl.clientHeight);
      const margin = { top: 24, right: 24, bottom: 44, left: 56 };
      const innerW = width - margin.left - margin.right;
      const innerH = height - margin.top - margin.bottom;

      const x = d3.scaleLinear().domain([-5, 5]).range([0, innerW]);
      const y = d3.scaleLinear().domain([-5, 5]).range([innerH, 0]);

      const data = buildData(a, n);
      const line = d3.line().x((d) => x(d.x)).y((d) => y(d.y));

      const svg = d3
        .create("svg")
        .attr("viewBox", `0 0 ${width} ${height}`)
        .attr("width", width)
        .attr("height", height)
        .style("background", "#111722");

      const g = svg.append("g").attr("transform", `translate(${margin.left},${margin.top})`);

      const ticks = d3.range(-5, 6, 1);
      g.append("g")
        .selectAll("line.vgrid")
        .data(ticks)
        .join("line")
        .attr("x1", (d) => x(d))
        .attr("x2", (d) => x(d))
        .attr("y1", 0)
        .attr("y2", innerH)
        .attr("stroke", "rgba(255,255,255,0.14)");

      g.append("g")
        .selectAll("line.hgrid")
        .data(ticks)
        .join("line")
        .attr("x1", 0)
        .attr("x2", innerW)
        .attr("y1", (d) => y(d))
        .attr("y2", (d) => y(d))
        .attr("stroke", "rgba(255,255,255,0.14)");

      g.append("line")
        .attr("x1", x(-5))
        .attr("x2", x(5))
        .attr("y1", y(0))
        .attr("y2", y(0))
        .attr("stroke", "#f6f8fb")
        .attr("stroke-width", 1.5);

      g.append("line")
        .attr("x1", x(0))
        .attr("x2", x(0))
        .attr("y1", y(-5))
        .attr("y2", y(5))
        .attr("stroke", "#f6f8fb")
        .attr("stroke-width", 1.5);

      g.append("path")
        .datum(data)
        .attr("fill", "none")
        .attr("stroke", "#67d6ff")
        .attr("stroke-width", 3)
        .attr("d", line);

      g.append("g")
        .attr("class", "axis")
        .attr("transform", `translate(0,${y(0)})`)
        .call(d3.axisBottom(x).tickValues(ticks));

      g.append("g")
        .attr("class", "axis")
        .attr("transform", `translate(${x(0)},0)`)
        .call(d3.axisLeft(y).tickValues(ticks));

      plotEl.replaceChildren(svg.node());
    }

    aSlider.addEventListener("input", render);
    nSlider.addEventListener("input", render);
    window.addEventListener("resize", render);

    render();
  </script>
</body>
</html>
