<!doctype html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Power Function (Unovis)</title>
<link rel="stylesheet" href="shared-app.css">
<script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
<script src="shared-power.js"></script>
</head>
<body>
<main class="app">
  <section class="controls">
    <div class="row"><label for="a">a</label><input id="a" type="range" min="-5" max="5" step="0.1" value="1"><output id="aOut">1.0</output></div>
    <div class="row"><label for="n">n</label><input id="n" type="range" min="-4" max="8" step="1" value="2"><output id="nOut">2</output></div>
  </section>
  <div id="formula" class="formula">\(f(x)=1.0\cdot x^{2}\)</div>
  <div id="plot" class="plot-surface"></div>
</main>
<script type="module">
import { XYContainer, Axis, Line, Plotline } from "https://cdn.jsdelivr.net/npm/@unovis/ts@1.6.4/+esm";

const shared = window.PowerShared;
const { X_MIN, X_MAX, Y_MIN, Y_MAX } = shared;
const ui = shared.getPowerUI("plot");

const range = (from, to) => Array.from({ length: to - from + 1 }, (_, i) => from + i);
const ticks = range(Math.ceil(X_MIN), Math.floor(X_MAX));

const xGridLines = ticks.map(v => new Plotline({ axis: "x", value: v, color: "rgba(246,248,251,0.35)" }));
const xAxisAtZero = new Plotline({ axis: "x", value: 0, color: "#f6f8fb" });
const yAxisAtZero = new Plotline({ axis: "y", value: 0, color: "#f6f8fb" });
const leftLine  = new Line({ x: d => d.x, y: d => d.yL, color: "#5eead4" });
const rightLine = new Line({ x: d => d.x, y: d => d.yR, color: "#5eead4" });

const components = [
  new Axis({ type: "x", tickValues: ticks }),
  new Axis({ type: "y", tickValues: ticks }),
  ...xGridLines, xAxisAtZero, yAxisAtZero, leftLine, rightLine
];

function buildData(a, n) {
  const neg = n < 0;
  return shared.samplePoints(a, n, 1200, X_MIN, X_MAX).map(({ x, y }) => {
    const v = shared.isVisibleY(y) ? y : undefined;
    return { x, yL: neg && x > -0.001 ? undefined : v,
                yR: neg && x <  0.001 ? undefined : v };
  });
}

let chart;
function render() {
  const { a, n } = shared.syncPowerUI(ui);
  const data = buildData(a, n);
  const { clientWidth: w, clientHeight: h } = ui.plotEl;
  if (!w || !h) return;
  if (!chart) {
    chart = new XYContainer(ui.plotEl, { components, xDomain: [X_MIN, X_MAX], yDomain: [Y_MIN, Y_MAX], width: w, height: h }, data);
  } else {
    chart.setData(data);
  }
}

shared.bindPowerUI(ui, render, render);
render();
</script>
</body>
</html>
