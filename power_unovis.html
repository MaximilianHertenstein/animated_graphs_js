<!doctype html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Power Function (Unovis)</title>
  <link rel="stylesheet" href="shared-app.css">
  <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
  <script src="shared-power.js"></script>
  <style>
    #plot {
      position: relative;
      overflow: hidden;
      background-color: #121826;
      background-image:
        linear-gradient(to right, rgba(255, 255, 255, 0.18) 1px, transparent 1px),
        linear-gradient(to top, rgba(255, 255, 255, 0.18) 1px, transparent 1px);
      background-size: calc(100% / 10) 100%, 100% calc(100% / 10);
      background-position: center center;
    }

    #plot::before,
    #plot::after {
      content: "";
      position: absolute;
      background: #f6f8fb;
      pointer-events: none;
      z-index: 1;
    }

    #plot::before {
      left: 50%;
      top: 0;
      width: 2px;
      height: 100%;
      transform: translateX(-50%);
    }

    #plot::after {
      left: 0;
      top: 50%;
      width: 100%;
      height: 2px;
      transform: translateY(-50%);
    }

    #uv {
      position: absolute;
      inset: 0;
      z-index: 2;
    }
  </style>
</head>
<body>
  <main class="app">
    <section class="controls">
      <div class="row"><label for="a">a</label><input id="a" type="range" min="-5" max="5" step="0.1" value="1"><output id="aOut">1.0</output></div>
      <div class="row"><label for="n">n</label><input id="n" type="range" min="-4" max="8" step="1" value="2"><output id="nOut">2</output></div>
    </section>
    <div id="formula" class="formula">\(f(x)=1.0\cdot x^{2}\)</div>
    <div id="plot" class="plot-surface"><div id="uv"></div></div>
  </main>

  <script type="module">
    import { XYContainer, Line } from "https://cdn.jsdelivr.net/npm/@unovis/ts@1.6.4/+esm";

    const shared = window.PowerShared;
    const ui = shared.getPowerUI("plot");
    const unovisHost = document.getElementById("uv");
    const X_DOMAIN = [shared.X_MIN, shared.X_MAX];
    const Y_DOMAIN = [shared.Y_MIN, shared.Y_MAX];
    const SAMPLE_STEPS = 1200;
    const EPS = 0.001;
    let chart;

    const makeLine = (yKey) => new Line({
      x: (d) => d.x,
      y: (d) => d[yKey],
      color: "#5eead4",
    });

    const leftLine = makeLine("yLeft");
    const rightLine = makeLine("yRight");

    function buildData(a, n) {
      const isNegativeExponent = n < 0;

      return shared.samplePoints(a, n, SAMPLE_STEPS, shared.X_MIN, shared.X_MAX)
        .map((point) => {
          const visibleY = shared.isVisibleY(point.y) ? point.y : undefined;
          const isLeft = point.x < -EPS;
          const isRight = point.x > EPS;

          return {
            x: point.x,
            yLeft: !isNegativeExponent || isLeft ? visibleY : undefined,
            yRight: isNegativeExponent && isRight ? visibleY : undefined,
          };
        });
    }

    function render() {
      const { a, n } = shared.syncPowerUI(ui);
      const data = buildData(a, n);
      const width = ui.plotEl.clientWidth;
      const height = ui.plotEl.clientHeight;

      if (!width || !height) return;

      if (!chart) {
        chart = new XYContainer(unovisHost, {
          components: [leftLine, rightLine],
          xDomain: X_DOMAIN,
          yDomain: Y_DOMAIN,
          width,
          height,
        }, data);
        return;
      }

      chart.setData(data);
    }

    shared.bindPowerUI(ui, render, render);

    render();
  </script>
</body>
</html>
