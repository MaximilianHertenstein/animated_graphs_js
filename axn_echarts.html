<!doctype html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ax^n (ECharts)</title>
  <script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; background: #0f1117; color: #e7ecf3; font-family: system-ui, sans-serif; }
    .app { width: 100vw; height: 100vh; display: grid; grid-template-rows: auto 1fr; gap: 10px; padding: 12px; }
    .controls { display: grid; gap: 8px; }
    .row { display: grid; grid-template-columns: 24px 1fr 50px; gap: 8px; align-items: center; }
    #chart { width: 100%; height: 100%; background: #121826; border: 1px solid #2a3347; }
  </style>
</head>
<body>
  <main class="app">
    <section class="controls">
      <div class="row"><label for="a">a</label><input id="a" type="range" min="-5" max="5" step="0.1" value="1"><output id="aOut">1.0</output></div>
      <div class="row"><label for="n">n</label><input id="n" type="range" min="-4" max="8" step="1" value="2"><output id="nOut">2</output></div>
    </section>
    <div id="chart"></div>
  </main>

  <script>
    const aS = document.getElementById('a');
    const nS = document.getElementById('n');
    const aOut = document.getElementById('aOut');
    const nOut = document.getElementById('nOut');
    const chart = echarts.init(document.getElementById('chart'));

    function series(a, n) {
      const points = [];
      for (let i = 0; i <= 3000; i++) {
        const x = -5 + (10 * i / 3000);
        const y = a * Math.pow(Math.abs(x), n) * (x < 0 && n % 2 !== 0 ? -1 : 1);
        points.push([x, Number.isFinite(y) ? y : null]);
      }
      return points;
    }

    function render() {
      const a = parseFloat(aS.value), n = parseInt(nS.value, 10);
      aOut.textContent = a.toFixed(1); nOut.textContent = String(n);
      chart.setOption({
        animation: false,
        grid: { left: 56, right: 24, top: 24, bottom: 40 },
        xAxis: { type: 'value', min: -5, max: 5, interval: 1, axisLine: { lineStyle: { color: '#f6f8fb', width: 1.5 } }, splitLine: { lineStyle: { color: 'rgba(255,255,255,0.15)' } }, axisLabel: { color: '#d7dfeb' } },
        yAxis: { type: 'value', min: -5, max: 5, interval: 1, axisLine: { lineStyle: { color: '#f6f8fb', width: 1.5 } }, splitLine: { lineStyle: { color: 'rgba(255,255,255,0.15)' } }, axisLabel: { color: '#d7dfeb' } },
        series: [{ type: 'line', data: series(a, n), showSymbol: false, lineStyle: { width: 3, color: '#5eead4' } }]
      }, true);
    }

    aS.addEventListener('input', render);
    nS.addEventListener('input', render);
    window.addEventListener('resize', () => chart.resize());
    render();
  </script>
</body>
</html>
