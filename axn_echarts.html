<!doctype html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ax^n Explorer (ECharts)</title>
  <script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      height: 100vh;
      background: #0f1117;
      color: #e7ecf3;
      font-family: "Segoe UI", system-ui, sans-serif;
      overflow: hidden;
    }
    .card {
      width: 100vw;
      min-height: 100vh;
      background: #171b24;
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 0;
      padding: 20px;
    }
    h1 {
      margin: 0 0 8px;
      font-size: 1.2rem;
      font-weight: 600;
    }
    .formula {
      margin: 0 0 14px;
      color: #aab5c5;
      min-height: 32px;
      font-size: 1.1rem;
    }
    .controls {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
      margin-bottom: 14px;
    }
    .row {
      display: grid;
      grid-template-columns: 26px 1fr 56px;
      align-items: center;
      gap: 10px;
    }
    .row label {
      color: #aab5c5;
      font-family: "Cascadia Code", "Consolas", monospace;
    }
    .row output {
      text-align: right;
      color: #e7ecf3;
      font-family: "Cascadia Code", "Consolas", monospace;
    }
    #chart {
      width: 100%;
      height: calc(100vh - 180px);
      min-height: 380px;
      border-radius: 10px;
      overflow: hidden;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>ax^n Explorer (ECharts)</h1>
    <p class="formula" id="formula">\(f(x)=1.0\cdot x^{2.0}\)</p>

    <section class="controls">
      <div class="row">
        <label for="a">a</label>
        <input id="a" type="range" min="-5" max="5" step="0.1" value="1">
        <output id="aOut">1.0</output>
      </div>
      <div class="row">
        <label for="n">n</label>
        <input id="n" type="range" min="-4" max="8" step="1" value="2">
        <output id="nOut">2</output>
      </div>
    </section>

    <div id="chart"></div>
  </main>

  <script>
    const aSlider = document.getElementById('a');
    const nSlider = document.getElementById('n');
    const aOut = document.getElementById('aOut');
    const nOut = document.getElementById('nOut');
    const formula = document.getElementById('formula');

    const chart = echarts.init(document.getElementById('chart'));

    function buildSeriesData(a, n) {
      const points = [];
      const steps = 500;
      for (let i = 0; i <= steps; i++) {
        const x = -5 + (10 * i) / steps;
        // Keep the curve continuous for slider teaching by using sign-preserving power.
        const y = a * Math.pow(Math.abs(x), n) * (x < 0 && n % 2 !== 0 ? -1 : 1);
        points.push([x, Number.isFinite(y) ? y : null]);
      }
      return points;
    }

    function render() {
      const a = parseFloat(aSlider.value);
      const n = parseInt(nSlider.value, 10);

      aOut.value = a.toFixed(1);
      nOut.value = n;

      formula.innerHTML = `\\(f(x)=${a.toFixed(1)}\\cdot x^{${n}}\\)`;
      if (window.MathJax && MathJax.typesetPromise) {
        MathJax.typesetPromise([formula]).catch(() => {});
      }

      chart.setOption({
        backgroundColor: '#111722',
        animation: false,
        grid: { left: 56, right: 24, top: 24, bottom: 44 },
        xAxis: {
          type: 'value',
          min: -5,
          max: 5,
          interval: 1,
          axisLine: { show: true, onZero: true, lineStyle: { color: '#f6f8fb', width: 1.5 } },
          axisTick: { show: true },
          axisLabel: { color: '#d7dfeb' },
          splitLine: { show: true, lineStyle: { color: 'rgba(255,255,255,0.14)' } }
        },
        yAxis: {
          type: 'value',
          min: -5,
          max: 5,
          interval: 1,
          axisLine: { show: true, onZero: true, lineStyle: { color: '#f6f8fb', width: 1.5 } },
          axisTick: { show: true },
          axisLabel: { color: '#d7dfeb' },
          splitLine: { show: true, lineStyle: { color: 'rgba(255,255,255,0.14)' } }
        },
        series: [{
          type: 'line',
          data: buildSeriesData(a, n),
          showSymbol: false,
          connectNulls: false,
          lineStyle: { width: 3, color: '#67d6ff' }
        }]
      }, true);
    }

    aSlider.addEventListener('input', render);
    nSlider.addEventListener('input', render);
    window.addEventListener('resize', () => chart.resize());

    render();
  </script>
</body>
</html>
