<!doctype html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Power Function (ApexCharts)</title>
  <link rel="stylesheet" href="shared-app.css">
  <script src="https://cdn.jsdelivr.net/npm/apexcharts"></script>
  <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
  <script src="shared-power.js"></script>
  <style>
    #chart {
      position: relative;
      overflow: hidden;
    }

    #chart::before,
    #chart::after {
      content: "";
      position: absolute;
      background: #f6f8fb;
      pointer-events: none;
      z-index: 5;
    }

    #chart::before {
      left: 50%;
      top: 0;
      width: 2px;
      height: 100%;
      transform: translateX(-50%);
    }

    #chart::after {
      left: 0;
      top: 50%;
      width: 100%;
      height: 2px;
      transform: translateY(-50%);
    }
  </style>
</head>
<body>
  <main class="app">
    <section class="controls">
      <div class="row"><label for="a">a</label><input id="a" type="range" min="-5" max="5" step="0.1" value="1"><output id="aOut">1.0</output></div>
      <div class="row"><label for="n">n</label><input id="n" type="range" min="-4" max="8" step="1" value="2"><output id="nOut">2</output></div>
    </section>
    <div id="formula" class="formula">\(f(x)=1.0\cdot x^{2}\)</div>
    <div id="chart" class="plot-surface"></div>
  </main>

  <script>
    const ui = PowerShared.getPowerUI("chart");
    const chart = new ApexCharts(ui.plotEl, {
      chart: {
        type: "line",
        height: "100%",
        width: "100%",
        animations: { enabled: false },
        toolbar: { show: false },
        zoom: { enabled: false },
        background: "transparent",
      },
      series: [{ name: "f(x)", data: [] }],
      stroke: { curve: "straight", width: 3, colors: ["#5eead4"] },
      markers: { size: 0 },
      dataLabels: { enabled: false },
      xaxis: {
        type: "numeric",
        min: PowerShared.X_MIN,
        max: PowerShared.X_MAX,
        tickAmount: 10,
        labels: { style: { colors: "#d7dfeb" } },
        axisBorder: { color: "#f6f8fb" },
        axisTicks: { color: "#f6f8fb" },
      },
      yaxis: {
        min: PowerShared.Y_MIN,
        max: PowerShared.Y_MAX,
        tickAmount: 10,
        labels: { style: { colors: "#d7dfeb" } },
      },
      grid: {
        borderColor: "rgba(255, 255, 255, 0.15)",
        strokeDashArray: 0,
      },
      annotations: {
        xaxis: [{
          x: 0,
          borderColor: "#f6f8fb",
          strokeDashArray: 0,
        }],
        yaxis: [{
          y: 0,
          borderColor: "#f6f8fb",
          strokeDashArray: 0,
        }],
      },
      tooltip: { enabled: false },
      legend: { show: false },
      theme: { mode: "dark" },
    });

    function buildSeries(a, n) {
      return PowerShared.sampleVisiblePoints(a, n, 3000).map((point) => ({ x: point.x, y: point.y }));
    }

    function render() {
      const { a, n } = PowerShared.syncPowerUI(ui);
      chart.updateSeries([{ name: "f(x)", data: buildSeries(a, n) }], false);
    }

    chart.render().then(() => {
      PowerShared.bindPowerUI(ui, render, () => chart.updateOptions({ chart: { width: "100%", height: "100%" } }, false, false, false));
      render();
    });
  </script>
</body>
</html>
