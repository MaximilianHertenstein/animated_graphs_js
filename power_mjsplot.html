<!doctype html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Power Function (MJS Plot)</title>
  <link rel="stylesheet" href="shared-app.css">
  <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
  <script src="shared-power.js"></script>
  <style>
    .axis text { fill: #d7dfeb; }
    .axis path,
    .axis line { stroke: rgba(255, 255, 255, 0.45); }
  </style>
</head>
<body>
  <main class="app">
    <section class="controls">
      <div class="row">
        <label for="a">a</label>
        <input id="a" type="range" min="-5" max="5" step="0.1" value="1">
        <output id="aOut">1.0</output>
      </div>
      <div class="row">
        <label for="n">n</label>
        <input id="n" type="range" min="-4" max="8" step="1" value="2">
        <output id="nOut">2</output>
      </div>
    </section>
    <div id="formula" class="formula">\(f(x)=1.0\cdot x^{2}\)</div>
    <div id="plot" class="plot-surface"></div>
  </main>

  <script type="module">
    import * as d3 from "https://cdn.jsdelivr.net/npm/d3@7/+esm";

    const aS = document.getElementById("a");
    const nS = document.getElementById("n");
    const aO = document.getElementById("aOut");
    const nO = document.getElementById("nOut");
    const formula = document.getElementById("formula");
    const el = document.getElementById("plot");

    function buildData(a, n) {
      return window.PowerShared.samplePoints(a, n, 3000, -5, 5);
    }

    function render() {
      const { a, n } = window.PowerShared.getParams(aS, nS, aO, nO);
      window.PowerShared.updatePowerFormula(formula, a, n);

      const w = el.clientWidth;
      const h = el.clientHeight;
      const m = { l: 56, r: 24, t: 24, b: 40 };
      const iw = w - m.l - m.r;
      const ih = h - m.t - m.b;

      const x = d3.scaleLinear().domain([-5, 5]).range([0, iw]);
      const y = d3.scaleLinear().domain([-5, 5]).range([ih, 0]);

      const svg = d3.create("svg")
        .attr("viewBox", `0 0 ${w} ${h}`)
        .attr("width", w)
        .attr("height", h)
        .style("background", "#121826");

      const g = svg.append("g").attr("transform", `translate(${m.l},${m.t})`);
      const ticks = window.PowerShared.TICKS;

      ticks.forEach(v => {
        g.append("line").attr("x1", x(v)).attr("x2", x(v)).attr("y1", 0).attr("y2", ih).attr("stroke", "rgba(255,255,255,.15)");
        g.append("line").attr("x1", 0).attr("x2", iw).attr("y1", y(v)).attr("y2", y(v)).attr("stroke", "rgba(255,255,255,.15)");
      });

      const line = d3.line()
        .defined((p) => Number.isFinite(p.y) && p.y >= -5 && p.y <= 5)
        .x((p) => x(p.x))
        .y((p) => y(p.y));

      g.append("path")
        .datum(buildData(a, n))
        .attr("fill", "none")
        .attr("stroke", "#5eead4")
        .attr("stroke-width", 3)
        .attr("d", line);

      g.append("g")
        .attr("transform", `translate(0,${y(0)})`)
        .call(d3.axisBottom(x).tickValues(ticks));

      g.append("g")
        .attr("transform", `translate(${x(0)},0)`)
        .call(d3.axisLeft(y).tickValues(ticks));

      g.append("line")
        .attr("x1", x(-5)).attr("x2", x(5))
        .attr("y1", y(0)).attr("y2", y(0))
        .attr("stroke", "#f6f8fb").attr("stroke-width", 2);

      g.append("line")
        .attr("x1", x(0)).attr("x2", x(0))
        .attr("y1", y(-5)).attr("y2", y(5))
        .attr("stroke", "#f6f8fb").attr("stroke-width", 2);

      g.selectAll(".tick text")
        .attr("fill", "#d7dfeb")
        .attr("font-size", "12px");

      el.replaceChildren(svg.node());
    }

    aS.addEventListener("input", render);
    nS.addEventListener("input", render);
    window.addEventListener("resize", render);
    render();
  </script>
</body>
</html>
