<!doctype html>
<html lang="de">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Power Function (MJS Plot)</title>
  <style>
    * {
      box-sizing: border-box
    }

    body {
      margin: 0;
      background: #0f1117;
      color: #e7ecf3;
      font-family: system-ui, sans-serif
    }

    .app {
      width: 100vw;
      height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr;
      gap: 10px;
      padding: 12px
    }

    .controls {
      display: grid;
      gap: 8px
    }

    .row {
      display: grid;
      grid-template-columns: 24px 1fr 50px;
      gap: 8px;
      align-items: center
    }

    #plot {
      width: 100%;
      height: 100%;
      background: #121826;
      border: 1px solid #2a3347
    }

    #plot svg {
      width: 100%;
      height: 100%;
      display: block
    }

    .axis text {
      fill: #d7dfeb
    }

    .axis path,
    .axis line {
      stroke: rgba(255, 255, 255, .45)
    }
  </style>
</head>

<body>
  <main class="app">
    <section class="controls">
      <div class="row"><label for="a">a</label><input id="a" type="range" min="-5" max="5" step="0.1" value="1"><output
          id="aOut">1.0</output></div>
      <div class="row"><label for="n">n</label><input id="n" type="range" min="-4" max="8" step="1" value="2"><output
          id="nOut">2</output></div>
    </section>
    <div id="plot"></div>
  </main>
  <script type="module">
    import * as d3 from "https://cdn.jsdelivr.net/npm/d3@7/+esm";
    const aS = document.getElementById('a'), nS = document.getElementById('n'), aO = document.getElementById('aOut'), nO = document.getElementById('nOut'), el = document.getElementById('plot');
    function d(a, n) { const out = []; for (let i = 0; i <= 3000; i++) { const x = -5 + 10 * i / 3000; const y = a * Math.pow(Math.abs(x), n) * (x < 0 && n % 2 !== 0 ? -1 : 1); out.push({ x, y }); } return out; }
    function r() { const a = parseFloat(aS.value), n = parseInt(nS.value, 10); aO.textContent = a.toFixed(1); nO.textContent = String(n); const w = el.clientWidth, h = el.clientHeight, m = { l: 56, r: 24, t: 24, b: 40 }, iw = w - m.l - m.r, ih = h - m.t - m.b, x = d3.scaleLinear().domain([-5, 5]).range([0, iw]), y = d3.scaleLinear().domain([-5, 5]).range([ih, 0]); const svg = d3.create('svg').attr('viewBox', `0 0 ${w} ${h}`).attr('width', w).attr('height', h).style('background', '#121826'); const g = svg.append('g').attr('transform', `translate(${m.l},${m.t})`); const t = d3.range(-5, 6, 1); g.selectAll('line.v').data(t).join('line').attr('x1', v => x(v)).attr('x2', v => x(v)).attr('y1', 0).attr('y2', ih).attr('stroke', 'rgba(255,255,255,.15)'); g.selectAll('line.h').data(t).join('line').attr('x1', 0).attr('x2', iw).attr('y1', v => y(v)).attr('y2', v => y(v)).attr('stroke', 'rgba(255,255,255,.15)'); g.append('line').attr('x1', x(-5)).attr('x2', x(5)).attr('y1', y(0)).attr('y2', y(0)).attr('stroke', '#f6f8fb').attr('stroke-width', 1.5); g.append('line').attr('x1', x(0)).attr('x2', x(0)).attr('y1', y(-5)).attr('y2', y(5)).attr('stroke', '#f6f8fb').attr('stroke-width', 1.5); g.append('path').datum(d(a, n)).attr('fill', 'none').attr('stroke', '#5eead4').attr('stroke-width', 3).attr('d', d3.line().x(p => x(p.x)).y(p => y(p.y))); g.append('g').attr('class', 'axis').attr('transform', `translate(0,${y(0)})`).call(d3.axisBottom(x).tickValues(t)); g.append('g').attr('class', 'axis').attr('transform', `translate(${x(0)},0)`).call(d3.axisLeft(y).tickValues(t)); el.replaceChildren(svg.node()); }
    aS.addEventListener('input', r); nS.addEventListener('input', r); window.addEventListener('resize', r); r();
  </script>
</body>

</html>
