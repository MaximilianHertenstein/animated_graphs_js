<!doctype html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Power Function (ECharts)</title>
  <link rel="stylesheet" href="shared-app.css">
  <script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
  <script src="shared-power.js"></script>
</head>
<body>
  <main class="app">
    <section class="controls">
      <div class="row"><label for="a">a</label><input id="a" type="range" min="-5" max="5" step="0.1" value="1"><output id="aOut">1.0</output></div>
      <div class="row"><label for="n">n</label><input id="n" type="range" min="-4" max="8" step="1" value="2"><output id="nOut">2</output></div>
    </section>
    <div id="formula" class="formula">\(f(x)=1.0\cdot x^{2}\)</div>
    <div id="chart" class="plot-surface"></div>
  </main>

  <script>
    const aS = document.getElementById("a");
    const nS = document.getElementById("n");
    const aOut = document.getElementById("aOut");
    const nOut = document.getElementById("nOut");
    const formula = document.getElementById("formula");
    const chart = echarts.init(document.getElementById("chart"));

    function series(a, n) {
      const points = [];
      for (let i = 0; i <= 3000; i++) {
        const x = -5 + (10 * i) / 3000;
        const y = PowerShared.powerY(a, n, x);
        points.push([x, Number.isFinite(y) ? y : null]);
      }
      return points;
    }

    function render() {
      const { a, n } = PowerShared.getParams(aS, nS, aOut, nOut);
      PowerShared.updatePowerFormula(formula, a, n);

      chart.setOption({
        animation: false,
        grid: { left: 56, right: 24, top: 24, bottom: 40 },
        xAxis: {
          type: "value", min: -5, max: 5, interval: 1,
          axisLine: { lineStyle: { color: "#f6f8fb", width: 1.5 } },
          splitLine: { lineStyle: { color: "rgba(255,255,255,0.15)" } },
          axisLabel: { color: "#d7dfeb" }
        },
        yAxis: {
          type: "value", min: -5, max: 5, interval: 1,
          axisLine: { lineStyle: { color: "#f6f8fb", width: 1.5 } },
          splitLine: { lineStyle: { color: "rgba(255,255,255,0.15)" } },
          axisLabel: { color: "#d7dfeb" }
        },
        series: [{ type: "line", data: series(a, n), showSymbol: false, lineStyle: { width: 3, color: "#5eead4" } }]
      }, true);
    }

    aS.addEventListener("input", render);
    nS.addEventListener("input", render);
    window.addEventListener("resize", () => chart.resize());
    render();
  </script>
</body>
</html>
